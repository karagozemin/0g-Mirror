<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="0G Mirror logo">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00D1C1" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect x="64" y="64" width="896" height="896" rx="80" fill="#090B0F" />

  <!-- central mark (stylized mirror diamond) -->
  <g transform="translate(512,480)" filter="url(#s)">
    <g transform="scale(0.72)">
      <path d="M0,-280 L160,-120 L160,120 L0,280 L-160,120 L-160,-120 Z" fill="url(#g1)"/>
      <path d="M0,-240 L120,-100 L120,100 L0,240 L-120,100 L-120,-100 Z" fill="#07101A" opacity="0.18"/>
      <path d="M0,-200 L90,-80 L90,80 L0,200 L-90,80 L-90,-80 Z" fill="#0D1620" opacity="0.35"/>
      <rect x="-28" y="-280" width="56" height="560" rx="8" fill="#FFFFFF" opacity="0.06" transform="rotate(8)"/>
      <rect x="-28" y="-280" width="56" height="560" rx="8" fill="#FFFFFF" opacity="0.06" transform="rotate(-8)"/>
    </g>
  </g>

  <!-- subtle ring and text -->
  <g transform="translate(512,800)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, Roboto, Arial, sans-serif" font-size="56" fill="#CFEFFB">0G Mirror</text>
  </g>

</svg>
